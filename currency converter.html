<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 350px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .amount input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .dropdown {
      display: flex;
      align-items: center; 
      justify-content: space-between; 
      gap: 10px;             
      margin: 15px 0;
    }

    .dropdown img {
      width: 40px;
      height: 28px;          
      object-fit: cover;     
    }

    select {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    .msg {
      margin-top: 20px;
      font-weight: bold;
      color: #222;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 6px;
    }

    .swap-icon {
      font-size: 20px;
      margin: 0 10px;
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Currency Converter</h2>
    <form>
      <div class="amount">
        <p>Enter Amount</p>
        <input value="1" type="number" min="1" />
      </div>
      <div class="dropdown">
        <div class="from">
          <p>From</p>
          <div class="select-container">
            <img src="https://flagsapi.com/US/flat/64.png" />
            <select name="from"></select>
          </div>
        </div>
        <div class="swap-icon">
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
        </div>
        <div class="to">
          <p>To</p>
          <div class="select-container">
            <img src="https://flagsapi.com/IN/flat/64.png" />
            <select name="to"></select>
          </div>
        </div>
      </div>
      <div class="msg">Exchange rate will appear here</div>
      <button>Get Exchange Rate</button>
    </form>
  </div>

  <!-- Font Awesome for swap icon -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" crossorigin="anonymous"></script>

  <script>
    const BASE_URL = "https://2026-07-13.currency-api.pages.dev/v1/currencies";

    const countryList = {
      USD: "US", INR: "IN", EUR: "FR", GBP: "GB", JPY: "JP", CAD: "CA", AUD: "AU", CNY: "CN"
      // Tum apna full countryList yahan paste kar sakti ho (jo tumne mujhe bheja tha)
    };

    const dropdowns = document.querySelectorAll(".dropdown select");
    const btn = document.querySelector("form button");
    const fromCurr = document.querySelector(".from select");
    const toCurr = document.querySelector(".to select");
    const msg = document.querySelector(".msg");

    // Populate dropdowns
    for (let select of dropdowns) {
      for (let currCode in countryList) {
        let newOption = document.createElement("option");
        newOption.innerText = currCode;
        newOption.value = currCode;
        if (select.name === "from" && currCode === "USD") {
          newOption.selected = "selected";
        } else if (select.name === "to" && currCode === "INR") {
          newOption.selected = "selected";
        }
        select.append(newOption);
      }

      select.addEventListener("change", (evt) => {
        updateFlag(evt.target);
      });
    }

    const updateExchangeRate = async () => {
      let amount = document.querySelector(".amount input");
      let amtVal = amount.value;
      if (amtVal === "" || amtVal < 1) {
        amtVal = 1;
        amount.value = "1";
      }

      const URL = `${BASE_URL}/${fromCurr.value.toLowerCase()}.json`;
      let response = await fetch(URL);
      let data = await response.json();

      // Correct way to access rate
      let rate = data[fromCurr.value.toLowerCase()][toCurr.value.toLowerCase()];
      if (!rate) {
        msg.innerText = "Exchange rate not available!";
        return;
      }

      let finalAmount = (amtVal * rate).toFixed(2);
      msg.innerText = `${amtVal} ${fromCurr.value} = ${finalAmount} ${toCurr.value}`;
    };

    const updateFlag = (element) => {
      let currCode = element.value;
      let countryCode = countryList[currCode];
      let newSrc = `https://flagsapi.com/${countryCode}/flat/64.png`;
      let img = element.parentElement.querySelector("img");
      img.src = newSrc;
    };

    btn.addEventListener("click", (evt) => {
      evt.preventDefault();
      updateExchangeRate();
    });

    window.addEventListener("load", () => {
      updateExchangeRate();
    });
  </script>
</body>
</html>
